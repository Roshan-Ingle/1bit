<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1bit.sbs | Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000; /* True Black */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
            ::selection { background: #333; color: #fff; }
        }

        /* Subtle cinematic top glow */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at top, rgba(255, 255, 255, 0.04) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        /* Minimalist Wireframe Container - Centered */
        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers elements */
            text-align: center; /* Centers text */
            gap: 24px;
            animation: slowFade 1.5s ease forwards;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            font-weight: 500;
        }

        .domain {
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: -1.5px;
            background: linear-gradient(180deg, #FFFFFF 0%, #777777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1rem;
            font-weight: 300;
            color: #888888;
            line-height: 1.6;
        }

        /* Sleek Separator - Fades on both ends */
        .divider {
            height: 1px;
            width: 80%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
            margin: 16px 0;
        }

        /* Profile Section - Vertically Stacked & Centered */
        .profile {
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 64px; 
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.15); /* Subtle rim */
        }

        .info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .name {
            font-size: 1rem;
            font-weight: 500;
            color: #eeeeee;
        }

        .email {
            font-size: 0.85rem;
            color: #555555;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .email:hover {
            color: #aaaaaa;
        }

        /* Ghost Button for Coffee - Centered */
        .coffee-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            color: #aaaaaa;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            transition: all 0.3s ease;
        }

        .coffee-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
            opacity: 0.7;
        }

        .coffee-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        @keyframes slowFade {
            0% { opacity: 0; filter: blur(10px); transform: translateY(10px); }
            100% { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .domain { font-size: 2.5rem; }
            .coffee-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <span class="badge">Parent Domain</span>
            <h1 class="domain">1bit.sbs</h1>
            <p class="tagline">Acting as the central hub for future digital projects and initiatives.</p>
        </div>

        <div class="divider"></div>

        <div class="profile">
            <!-- Updated full color image placed on top -->
            <img src="https://i.ibb.co/PGKd3RNn/Screenshot-2026-03-28-20-28-17-99-99c04817c0de5652397fc8b56c3b3817.jpg" alt="Roshan Ingle" class="avatar">
            <div class="info">
                <span class="name">Roshan Ingle</span>
                <a href="mailto:alwaysroshanpatil@gmail.com" class="email">alwaysroshanpatil@gmail.com</a>
            </div>
        </div>

        <a href="upi://pay?pa=Q968343371@ybl&pn=Roshan%20Ingle&tn=Buy%20me%20a%20coffee&cu=INR" class="coffee-btn">
            <svg viewBox="0 0 24 24">
                <path d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.11 0 2-.9 2-2V5c0-1.11-.89-2-2-2zm0 5h-2V5h2v3zM4 19h16v2H4z"/>
            </svg>
            Buy me a coffee
        </a>

    </div>

</body>
</html>
