<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost</title>
    <style>
        /* Importing a clean, modern sans-serif font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* Deep, rich black */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
        }

        .container {
            text-align: center;
            padding: 0 20px;
            max-width: 500px;
        }

        /* The 404 is massive but very dark, blending into the background */
        h1 {
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 300;
            margin: 0;
            line-height: 0.8;
            color: #151515; 
            letter-spacing: -0.05em;
            user-select: none;
        }

        /* The teasing joke */
        p {
            font-size: 1.1rem;
            font-weight: 300;
            color: #888888;
            margin-top: 2rem;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .highlight {
            color: #e0e0e0;
        }

        /* Ultra-minimal button */
        a {
            display: inline-block;
            padding: 12px 24px;
            color: #555555;
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: lowercase;
            letter-spacing: 0.05em;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            transition: all 0.4s ease;
        }

        a:hover {
            color: #ffffff;
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.03);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>
            You're completely lost. <br>
            <span class="highlight">But don't worry, nobody is looking for you here either.</span>
        </p>
        <a href="/">return to safety</a>
    </div>
</body>
</html>
