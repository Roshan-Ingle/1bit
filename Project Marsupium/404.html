<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        /* Import a cute, rounded font */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: #FFF0F5; /* Soft pastel background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #4E342E;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: #FFFFFF;
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 112, 67, 0.1);
            max-width: 90%;
            width: 500px;
            position: relative;
        }

        /* Cat Illustration */
        .cat-container {
            margin-bottom: -40px; /* Makes the cat "sit" on the 404 text */
            position: relative;
            z-index: 10;
            transition: transform 0.1s ease-out;
        }

        .cat-svg {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.05));
            animation: float 4s ease-in-out infinite;
        }

        /* 404 Text Styling */
        h1 {
            font-size: clamp(6rem, 20vw, 8rem);
            margin: 0;
            color: #4E342E;
            line-height: 1;
            text-shadow: 5px 5px 0px #FFE0B2;
            position: relative;
            z-index: 1;
            transition: transform 0.1s ease-out;
        }

        h2 {
            font-size: 1.8rem;
            margin: 15px 0;
            color: #FF7043;
        }

        p {
            font-size: 1.1rem;
            color: #8D6E63;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Button Styling */
        .home-btn {
            display: inline-block;
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #FFFFFF;
            background-color: #FF7043;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 112, 67, 0.3);
        }

        .home-btn:hover {
            background-color: #F4511E;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 112, 67, 0.4);
        }

        /* --- Animations --- */

        /* Floating effect for the cat */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* Blinking eyes */
        .eyes {
            transform-origin: 100px 115px;
            animation: blink 4s infinite;
        }

        @keyframes blink {
            0%, 46%, 48%, 50%, 100% { transform: scaleY(1); }
            47%, 49% { transform: scaleY(0.1); }
        }

        /* Tail wagging */
        .tail {
            transform-origin: 150px 150px;
            animation: wag 3s ease-in-out infinite alternate;
        }

        @keyframes wag {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(15deg); }
        }
        
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Interactive Cat -->
        <div class="cat-container" id="cat">
            <svg class="cat-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-label="Cute orange cat">
                <!-- Tail -->
                <path class="tail" d="M 150 150 C 180 150 190 120 180 100 C 170 80 150 90 150 110" fill="none" stroke="#F57C00" stroke-width="14" stroke-linecap="round"/>

                <!-- Back ears -->
                <polygon points="40,90 40,30 90,75" fill="#F57C00"/>
                <polygon points="160,90 160,30 110,75" fill="#F57C00"/>

                <!-- Inner ears -->
                <polygon points="45,85 45,45 80,75" fill="#FFE0B2"/>
                <polygon points="155,85 155,45 120,75" fill="#FFE0B2"/>

                <!-- Head Base -->
                <circle cx="100" cy="120" r="60" fill="#FFB74D"/>

                <!-- Blush Cheeks -->
                <ellipse cx="65" cy="130" rx="12" ry="7" fill="#FF8A65" opacity="0.5"/>
                <ellipse cx="135" cy="130" rx="12" ry="7" fill="#FF8A65" opacity="0.5"/>

                <!-- Eyes Group (Animated) -->
                <g class="eyes">
                    <!-- Left Eye -->
                    <circle cx="75" cy="115" r="7" fill="#4E342E"/>
                    <circle cx="73" cy="113" r="2.5" fill="#FFFFFF"/>
                    <!-- Right Eye -->
                    <circle cx="125" cy="115" r="7" fill="#4E342E"/>
                    <circle cx="123" cy="113" r="2.5" fill="#FFFFFF"/>
                </g>

                <!-- Nose -->
                <polygon points="96,126 104,126 100,131" fill="#FF7043"/>

                <!-- Kawaii "W" Mouth -->
                <path d="M 90 134 Q 95 142 100 134 Q 105 142 110 134" stroke="#4E342E" stroke-width="2.5" fill="none" stroke-linecap="round"/>

                <!-- Whiskers Left -->
                <line x1="20" y1="115" x2="45" y2="120" stroke="#4E342E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                <line x1="15" y1="125" x2="45" y2="125" stroke="#4E342E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                <line x1="20" y1="135" x2="45" y2="130" stroke="#4E342E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

                <!-- Whiskers Right -->
                <line x1="180" y1="115" x2="155" y2="120" stroke="#4E342E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                <line x1="185" y1="125" x2="155" y2="125" stroke="#4E342E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                <line x1="180" y1="135" x2="155" y2="130" stroke="#4E342E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

                <!-- Paws resting over the edge -->
                <rect x="65" y="170" width="22" height="30" rx="11" fill="#F57C00"/>
                <rect x="113" y="170" width="22" height="30" rx="11" fill="#F57C00"/>
                <rect x="67" y="172" width="18" height="26" rx="9" fill="#FFB74D"/>
                <rect x="115" y="172" width="18" height="26" rx="9" fill="#FFB74D"/>
            </svg>
        </div>

        <h1 id="error-text">404</h1>
        <h2>Meow-ps! Page Not Found</h2>
        <p>Looks like our mischievous cat knocked this page right off the server. Let's get you back to safety!</p>
        <a href="/" class="home-btn">Take Me Home, Meow!</a>
    </div>

    <!-- Mouse Parallax Effect -->
    <script>
        document.addEventListener("mousemove", (e) => {
            const cat = document.getElementById('cat');
            const text = document.getElementById('error-text');
            
            // Calculate cursor position relative to the center of the screen
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;

            // Apply slight movements to make elements feel 3D/alive
            cat.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
            text.style.transform = `translate(${xAxis * 0.5}px, ${yAxis * 0.5}px)`;
        });
    </script>
</body>
</html>
